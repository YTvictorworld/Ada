# Whisper POC Configuration
# Auto-generated on first run. Edit as needed.

# ── Microphone ──────────────────────────────────────────
# Partial mic name (e.g. "USB PnP", "Realtek") or null for system default
microphone: null

# ── Whisper Model ───────────────────────────────────────
# tiny (~1GB VRAM) | base (~1GB) | small (~2GB) | medium (~5GB) | large-v3 (~10GB)
model: large-v3

# Language code (es, en, fr, etc.)
language: es

# ── Device ──────────────────────────────────────────────
# cuda | cpu | auto (auto-detects GPU on first run)
device: auto

# float16 (GPU, faster) | int8 (CPU compatible) | auto
compute_type: auto

# ── STT Realtime (RealtimeSTT) ──────────────────────────
stt:
  # beam_size for final transcription (1 = fast, 5 = accurate)
  beam_size: 3
  # beam_size for partial transcription (realtime)
  beam_size_realtime: 1
  # Pause between partial processing (seconds)
  realtime_processing_pause: 0.2
  # Silence duration to detect end of phrase (seconds)
  post_speech_silence_duration: 0.4
  # Minimum recording duration (seconds)
  min_length_of_recording: 0.2
  # Silero VAD sensitivity (0.0 - 1.0, lower = more sensitive)
  silero_sensitivity: 0.4
  # Model for partial transcriptions (tiny recommended for speed)
  realtime_model_type: tiny
  # Early transcription on silence detection (seconds, 0 = disabled)
  early_transcription_on_silence: 0.2
  # Initial prompt for model context (kept in Spanish for Dominican Spanish recognition)
  initial_prompt: >-
    El hablante usa espanol dominicano y se dirige a una asistente de voz
    llamada Ada (se pronuncia "Eyda"). Ejemplos: "Ada, que hora es",
    "Ada, pon musica", "oye Ada".
    Ejemplos: 'que e lo que' significa 'que es lo que pasa',
    'vaina' significa 'cosa', 'tiguere' significa 'persona astuta',
    'klk' significa 'que lo que', 'ta to' significa 'esta todo bien',
    'dime a ver' es un saludo, 'pana' significa 'amigo',
    'jevi' significa 'bien o cool', 'moto concho' es un taxi en moto,
    'chin' significa 'un poco', 'guagua' significa 'autobus',
    'colmado' es una tienda de barrio.

# ── LLM ─────────────────────────────────────────────────
# Two backends are supported:
#   - llama-server: local LLM via llama.cpp's HTTP server (private, no API cost)
#   - claude:       Anthropic Claude API (faster, higher quality, requires API key)
llm:
  # Which backend to use: llama-server | claude
  provider: llama-server

  # Sliding window: max number of messages to keep (excludes system prompt)
  history_size: 20
  # Sampling temperature
  temperature: 0.7
  # System prompt (Ada's persona) — applies to both backends
  system_prompt: >-
    # Rol y objetivo
    Eres Ada (se pronuncia "Eyda"), la asistente personal del usuario.
    Tu objetivo es ayudar de forma util, breve y con clase, manteniendo
    una conversacion que se sienta humana, no robotica.

    # Personalidad y tono
    - Compania competente y leal, con criterio propio y elegancia
      natural. Discreta, observadora, con ingenio seco y bien medido.
    - Calida pero nunca empalagosa. Cortes pero nunca servil.
    - Tienes opiniones y puedes matizar o llevar la contraria con tacto.
    - NUNCA eres grosera, vulgar, insultante ni atacas al usuario. El
      humor es de ceja arriba, no de burla.

    # Longitud y formato
    - RESPUESTAS CORTAS por defecto: 1 o 2 frases. Maximo 3.
    - Solo te extiendes si el usuario pide explicitamente mas detalle.
    - Tu salida se lee en voz alta. PROHIBIDO: listas, markdown, emojis,
      numeracion, parentesis con aclaraciones, asteriscos, codigo.
    - Solo texto hablado, en espanol neutro. No cambies de idioma salvo
      que el usuario lo haga primero.

    # Comportamientos concretos (no generalidades)
    - Empieza respuestas de forma natural, no con plantillas. Varia
      arranques: a veces con la respuesta directa, a veces con un
      "mira", "claro", "buena pregunta", "me temo que...".
    - NO digas "estoy aqui para ayudarte", "en que mas puedo asistirte",
      "como asistente de IA", "espero haberte ayudado". Suena a script.
    - NO cierres cada turno preguntando si necesita algo mas. Solo
      pregunta cuando tenga sentido real en la conversacion.
    - Si no sabes algo, dilo con naturalidad: "me temo que no lo se",
      "no tengo ese dato", "ni idea, la verdad". Sin disculpas largas.
    - Si el usuario bromea, devuelve la broma con sutileza. Si esta
      serio, acompanalo en serio.

    # Manejo de entradas confusas
    - Si la transcripcion del usuario llega cortada, sin sentido o
      parece ruido, NO inventes una respuesta. Pide aclaracion breve:
      "perdona, no te escuche bien, puedes repetir?".
    - Si solo entiendes parte de lo que dijo, contesta a lo que
      entendiste y pide aclaracion del resto.

    # Variacion
    Estos ejemplos son guia, NO los repitas literalmente. Varia siempre.

  # Used when provider == llama-server.
  # llama-server must be running externally:
  #   llama-server -m /path/to/model.gguf --port 8080
  llama_server:
    # OpenAI-compatible endpoint
    endpoint: "http://localhost:8080"

  # Used when provider == claude.
  # Requires `pip install anthropic` and an API key.
  claude:
    # Model ID. Pick one based on your latency/cost/quality needs:
    #   claude-opus-4-6   — highest quality, slowest, most expensive
    #   claude-sonnet-4-6 — balanced
    #   claude-haiku-4-5  — fastest and cheapest (recommended for voice)
    model: claude-opus-4-6
    # Max tokens per response. Voice replies are short — 1024 is plenty.
    max_tokens: 1024
    # API key. Leave null to read from the ANTHROPIC_API_KEY environment variable
    # (recommended — keeps secrets out of config files).
    api_key: null
